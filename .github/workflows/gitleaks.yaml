name: Gitleaks Secret Scan

on:
  workflow_call:
    inputs:
      scan-mode:
        description: "スキャンモード: 'protect'(差分のみ) or 'detect'(全履歴)"
        type: string
        default: "protect"

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: |
          if [ "${{ inputs.scan-mode }}" = "detect" ]; then
            gitleaks detect --source . --verbose --exit-code 1
          else
            gitleaks protect --source . --verbose --staged --exit-code 1
          fi
