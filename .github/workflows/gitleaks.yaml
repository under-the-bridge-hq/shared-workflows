name: Gitleaks Secret Scan

on:
  workflow_call:
    inputs:
      scan-mode:
        description: "スキャンモード: 'protect'(差分のみ) or 'detect'(全履歴)"
        type: string
        default: "protect"
      config-path:
        description: "カスタム設定ファイルパス（省略時はデフォルト設定）"
        type: string
        default: ""

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: >-
            ${{ inputs.scan-mode == 'detect' && '--no-git' || '' }}
            ${{ inputs.config-path != '' && format('--config={0}', inputs.config-path) || '' }}
